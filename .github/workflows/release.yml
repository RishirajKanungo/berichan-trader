name: Release

# Builds the Windows .exe and publishes it (plus a SHA-256 checksum) to a GitHub
# Release whenever you push a version tag like v1.0.0.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Because the build runs here on GitHub from the public source, anyone can verify
# the released .exe was produced from exactly the code in this repo.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Sanity check (compile sources)
        run: python -m compileall -q berichan

      - name: Run tests
        run: python -m pytest -q

      - name: Build the executable
        run: pyinstaller berichan.spec

      - name: Smoke-test the executable launches
        shell: pwsh
        run: |
          # Launch with an offscreen Qt backend so the build agent (no display)
          # can confirm the frozen exe starts without crashing on import/init.
          $env:QT_QPA_PLATFORM = "offscreen"
          $p = Start-Process -FilePath "dist/BerichanCrossTransfer.exe" -PassThru
          Start-Sleep -Seconds 12
          if ($p.HasExited) {
            Write-Error "Executable exited early (exit $($p.ExitCode)) — likely a packaging/import error."
            exit 1
          }
          Stop-Process -Id $p.Id -Force
          Write-Host "Executable launched cleanly."

      - name: Compute SHA-256 checksum
        shell: pwsh
        run: |
          $exe = "dist/BerichanCrossTransfer.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  BerichanCrossTransfer.exe" | Out-File -Encoding ascii "$exe.sha256"
          Write-Host "SHA-256: $hash"
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "Size: $sizeMB MB"

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BerichanCrossTransfer.exe
            dist/BerichanCrossTransfer.exe.sha256
          generate_release_notes: true
          body: |
            ## BerichanCrossTransfer ${{ github.ref_name }}

            **Windows desktop app.** Download `BerichanCrossTransfer.exe` below and
            double-click — no Python, no installer, no admin rights needed.

            ### Is this safe?
            - This `.exe` was **built automatically by GitHub Actions from the public
              source in this repo** (see the Actions tab) — not uploaded by hand.
            - It is **open source** — read or build it yourself.
            - **No credentials are bundled.** You authenticate Twitch on first run;
              your token is encrypted (Windows DPAPI) and stored only on your PC.
            - Verify the download with the published **SHA-256** (see below).

            ### Verify your download (optional)
            In PowerShell, from your Downloads folder:
            ```powershell
            Get-FileHash .\BerichanCrossTransfer.exe -Algorithm SHA256
            ```
            The result must match `BerichanCrossTransfer.exe.sha256` attached here.

            ### First run
            Windows SmartScreen may show "Windows protected your PC" because the app
            is unsigned. Click **More info → Run anyway**. This is normal for
            unsigned open-source apps.
